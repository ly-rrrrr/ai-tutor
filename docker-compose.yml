services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 3000
      LOCAL_STORAGE_DIR: /app/storage
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ${LOCAL_STORAGE_HOST_DIR:-./.docker/storage}:/app/storage
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MYSQL_DATABASE: ai_tutor
      MYSQL_USER: ai_tutor
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ${MYSQL_DATA_DIR:-./.docker/mysql}:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      app:
        condition: service_healthy
    expose:
      - "80"
    ports:
      - "${CADDY_HTTP_BIND:-127.0.0.1:80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_DATA_DIR:-./.docker/caddy/data}:/data
      - ${CADDY_CONFIG_DIR:-./.docker/caddy/config}:/config

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      caddy:
        condition: service_started
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
